<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7WJI GPD Weights</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18202a;
      --muted: #5f6977;
      --line: #d8dee7;
      --soft: #f5f7fa;
      --accent: #c93f2d;
      --blue: #2f6fb0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #ffffff;
    }
    main {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 0;
    }
    .stage {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      min-width: 0;
      border-right: 1px solid var(--line);
    }
    header {
      padding: 18px 22px 12px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: 0;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: #fff;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
    }
    .toolbar-spacer { flex: 1; }
    .segmented {
      display: inline-flex;
      border: 1px solid #bfc8d5;
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
    }
    button {
      font: inherit;
      border: 0;
      background: #fff;
      color: var(--muted);
      padding: 7px 10px;
      cursor: pointer;
    }
    button + button { border-left: 1px solid #d5dbe4; }
    button.active {
      color: var(--ink);
      background: #e9eef5;
      font-weight: 600;
    }
    select {
      min-width: 280px;
      font: inherit;
      border: 1px solid #bfc8d5;
      border-radius: 6px;
      padding: 7px 9px;
      background: #fff;
    }
    label {
      font-size: 13px;
      color: var(--muted);
    }
    #plot {
      width: 100%;
      height: 100%;
      display: block;
      background: #fbfcfd;
      cursor: grab;
      touch-action: none;
    }
    #plot.dragging {
      cursor: grabbing;
    }
    aside {
      min-width: 0;
      background: #fff;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .side-head {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
    }
    .side-head h2 {
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: 0;
    }
    .side-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .tables {
      overflow: auto;
      padding: 12px 18px 22px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 7px 4px;
      border-bottom: 1px solid #edf0f4;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 600;
    }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .legend {
      padding: 10px 22px 16px;
      display: flex;
      gap: 14px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--line);
    }
    .swatch {
      width: 68px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #d9e3ef, #ffd38d, #c93f2d);
      border: 1px solid #c8d0da;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      aside { min-height: 360px; }
      .stage { border-right: 0; }
    }
  </style>
</head>

const intervalMeta = document.getElementById("intervalMeta");

const state = {
  mode: "3d",
  rotX: -0.35,
  rotY: 0.82,
  zoom: 1.0,
  dragging: false,
  lastX: 0,
  lastY: 0,
  cameraResetNeeded: true
};

function fmt(x, digits=3) {
  return Number(x).toFixed(digits).replace(/\.0+$/, "");
}

function residueKey(point) {
  return `${point.chain}|${point.residue_number}|${point.insertion_code}|${point.residue_name}`;
}

function weightForPoint(point, intervalIndex) {
  return (DATA.residue_weights[intervalIndex] || {})[residueKey(point)] || 0;
}

function color(weight, maxWeight) {
  if (maxWeight <= 0 || weight <= 0) return "#cbd3de";
  const t = Math.min(1, weight / maxWeight);
  if (t < 0.5) {
    const u = t / 0.5;
    return mix("#d9e3ef", "#ffd38d", u);
  }
  return mix("#ffd38d", "#c93f2d", (t - 0.5) / 0.5);
}

function mix(a, b, t) {
  const pa = hex(a), pb = hex(b);
  const r = Math.round(pa[0] + (pb[0] - pa[0]) * t);
  const g = Math.round(pa[1] + (pb[1] - pa[1]) * t);
  const bl = Math.round(pa[2] + (pb[2] - pa[2]) * t);
  return `rgb(${r},${g},${bl})`;
}

function hex(s) {
  const n = parseInt(s.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function modelStats() {
  const center = {
    x: mean(DATA.points.map(p => p.x)),
    y: mean(DATA.points.map(p => p.y)),
    z: mean(DATA.points.map(p => p.z)),
    pc1: mean(DATA.points.map(p => p.pc1)),
    pc2: mean(DATA.points.map(p => p.pc2))
  };
  let radius3 = 1;
  let radius2 = 1;
  for (const p of DATA.points) {
    radius3 = Math.max(radius3, Math.hypot(p.x - center.x, p.y - center.y, p.z - center.z));
    radius2 = Math.max(radius2, Math.hypot(p.pc1 - center.pc1, p.pc2 - center.pc2));
  }
  return {center, radius3, radius2};
}

function mean(values) {
  return values.reduce((a, b) => a + b, 0) / Math.max(1, values.length);
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * dpr));
  canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  if (ctx) {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  return {width: rect.width, height: rect.height};
}

function pointWeightData(interval) {
  const weights = DATA.points.map(p => weightForPoint(p, interval.interval_index));
  return {weights, maxWeight: Math.max(...weights, 0)};
}

function project3d(point, width, height) {
  const cx = model.center.x, cy = model.center.y, cz = model.center.z;
  const x0 = point.x - cx;
  const y0 = point.y - cy;
  const z0 = point.z - cz;
  const cosY = Math.cos(state.rotY), sinY = Math.sin(state.rotY);
  const cosX = Math.cos(state.rotX), sinX = Math.sin(state.rotX);
  const x1 = x0 * cosY + z0 * sinY;
  const z1 = -x0 * sinY + z0 * cosY;
  const y1 = y0 * cosX - z1 * sinX;
  const z2 = y0 * sinX + z1 * cosX;
  const baseScale = Math.min(width, height) * 0.42 / model.radius3 * state.zoom;
  const camera = 3.4 * model.radius3;
  const perspective = camera / Math.max(1e-6, camera - z2);
  return {
    x: width / 2 + x1 * baseScale * perspective,
    y: height / 2 - y1 * baseScale * perspective,
    depth: z2,
    perspective
  };
}

function project2d(point, width, height) {
  const scale = Math.min(width, height) * 0.43 / model.radius2 * state.zoom;
  return {
    x: width / 2 + (point.pc1 - model.center.pc1) * scale,
    y: height / 2 - (point.pc2 - model.center.pc2) * scale,
    depth: 0,
    perspective: 1
  };
}

function projectPoint(point, width, height) {
  return state.mode === "3d" ? project3d(point, width, height) : project2d(point, width, height);
}

function backboneEdges() {
  const edges = [];
  for (let i = 1; i < DATA.points.length; i++) {
    const a = DATA.points[i - 1];
    const b = DATA.points[i];
    if (a.chain === b.chain && Math.abs(a.residue_number - b.residue_number) <= 3) {
      edges.push([i - 1, i]);
    }
  }
  return edges;
}

function render(index) {
  if (useThree) {
    try {
      renderThree(index);
      return;
    } catch (error) {
      console.error("Three.js render failed; falling back to 2D canvas", error);
      useThree = false;
      three = null;
      if (!ctx) ctx = canvas.getContext("2d");
    }
  }
  if (ctx) {
    renderCanvas(index);
  }
}

function renderCanvas(index) {
  const interval = DATA.intervals[index];
  const {weights, maxWeight} = pointWeightData(interval);
  const {width, height} = resizeCanvas();
  ctx.clearRect(0, 0, width, height);
  drawBackground(width, height);
  const projected = DATA.points.map(point => projectPoint(point, width, height));
  drawBackbone(projected);
  drawWeightedEdges(interval, projected);
  drawPoints(projected, weights, maxWeight);
  drawViewLabel(width, height);

  intervalTitle.textContent = `Interval ${interval.interval_index}`;
  intervalMeta.textContent = `[${fmt(interval.birth, 3)}, ${fmt(interval.death, 3)}), persistence ${fmt(interval.persistence, 3)}, rank ${interval.rank}`;
  residueRows.replaceChildren();
  for (const row of interval.top_residues.slice(0, 18)) {
    const tr = document.createElement("tr");
    const residue = document.createElement("td");
    residue.textContent = `${row.chain}:${row.residue_name} ${row.residue_number}${row.insertion_code || ""}`;
    const weight = document.createElement("td");
    weight.className = "num";
    weight.textContent = fmt(row.weight, 5);
    tr.append(residue, weight);
    residueRows.append(tr);
  }
}

function setupThree() {
  if (three) return three;
  const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xfbfcfd);
  const camera = new THREE.PerspectiveCamera(45, 1, 0.05, 10000);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.screenSpacePanning = true;
  controls.addEventListener("change", () => renderer.render(scene, camera));
  three = {
    renderer,
    scene,
    camera,
    controls,
    sphereGeometry: new THREE.SphereGeometry(1, 18, 12),
    backboneMaterial: new THREE.LineBasicMaterial({color: 0x6f7d8d, transparent: true, opacity: 0.34}),
    edgeMaterial: new THREE.LineBasicMaterial({color: 0xc93f2d, transparent: true, opacity: 0.82})
  };
  return three;
}

function renderThree(index) {

  const view = setupThree();
  const {width, height} = resizeCanvas();
  view.renderer.setSize(width, height, false);
  view.camera.aspect = width / Math.max(1, height);
  view.camera.updateProjectionMatrix();
  while (view.scene.children.length) {
    view.scene.remove(view.scene.children[0]);
  }

  const activeRadius = state.mode === "3d" ? model.radius3 : model.radius2;
  if (state.cameraResetNeeded) {
    resetThreeCamera(activeRadius);
    state.cameraResetNeeded = false;
  }

  drawThreeBackbone(view);
  drawThreeWeightedEdges(view, interval);
  drawThreePoints(view, weights, maxWeight);
  view.controls.update();
  view.renderer.render(view.scene, view.camera);
  updateIntervalPanel(interval);
}

function resetThreeCamera(radius) {
  const view = setupThree();
  if (state.mode === "3d") {
    view.camera.position.set(radius * 0.65, -radius * 2.7, radius * 1.15);
  } else {
    view.camera.position.set(0, 0, radius * 2.8);
  }
  view.camera.near = Math.max(0.01, radius / 200);
  view.camera.far = Math.max(1000, radius * 20);
  view.camera.updateProjectionMatrix();
  view.controls.target.set(0, 0, 0);
  view.controls.update();
}

function pointPosition(point) {
  if (state.mode === "2d") {
    return new THREE.Vector3(
      point.pc1 - model.center.pc1,
      point.pc2 - model.center.pc2,
      0
    );
  }
  return new THREE.Vector3(
    point.x - model.center.x,
    point.y - model.center.y,
    point.z - model.center.z
  );
}

function drawThreeBackbone(view) {
  const vertices = [];
  for (const [leftIndex, rightIndex] of backboneEdges()) {
    const left = pointPosition(DATA.points[leftIndex]);
    const right = pointPosition(DATA.points[rightIndex]);
    vertices.push(left.x, left.y, left.z, right.x, right.y, right.z);
  }
  if (vertices.length === 0) return;
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
  view.scene.add(new THREE.LineSegments(geometry, view.backboneMaterial));
}

function drawThreeWeightedEdges(view, interval) {
  const vertices = [];
  for (const edge of interval.top_edges) {
    const leftPoint = DATA.points[edge.vertices[0]];
    const rightPoint = DATA.points[edge.vertices[1]];
    if (!leftPoint || !rightPoint) continue;
    const left = pointPosition(leftPoint);
    const right = pointPosition(rightPoint);
    vertices.push(left.x, left.y, left.z, right.x, right.y, right.z);
  }
  if (vertices.length === 0) return;
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
  view.scene.add(new THREE.LineSegments(geometry, view.edgeMaterial));
}

function drawThreePoints(view, weights, maxWeight) {
  const scaleBase = (state.mode === "3d" ? model.radius3 : model.radius2) * 0.012;
  DATA.points.forEach((point, index) => {
    const weight = weights[index];
    const material = new THREE.MeshBasicMaterial({
      color: new THREE.Color(color(weight, maxWeight)),
      transparent: true,
      opacity: weight > 1e-12 ? 0.98 : 0.72
    });
    const mesh = new THREE.Mesh(view.sphereGeometry, material);
    const position = pointPosition(point);
    mesh.position.copy(position);
    const radius = scaleBase * (0.75 + 2.5 * Math.sqrt(weight / Math.max(1e-9, maxWeight)));
    mesh.scale.set(radius, radius, radius);
    view.scene.add(mesh);
  });
}

function updateIntervalPanel(interval) {
  intervalTitle.textContent = `Interval ${interval.interval_index}`;
  intervalMeta.textContent = `[${fmt(interval.birth, 3)}, ${fmt(interval.death, 3)}), persistence ${fmt(interval.persistence, 3)}, rank ${interval.rank}`;
  residueRows.replaceChildren();
  for (const row of interval.top_residues.slice(0, 18)) {
    const tr = document.createElement("tr");
    const residue = document.createElement("td");
    residue.textContent = `${row.chain}:${row.residue_name} ${row.residue_number}${row.insertion_code || ""}`;
    const weight = document.createElement("td");
    weight.className = "num";
    weight.textContent = fmt(row.weight, 5);
    tr.append(residue, weight);
    residueRows.append(tr);
  }
}

function drawBackground(width, height) {
  const gradient = ctx.createLinearGradient(0, 0, 0, height);
  gradient.addColorStop(0, "#fbfcfd");
  gradient.addColorStop(1, "#f1f4f8");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);
}

function drawBackbone(projected) {
  ctx.save();
  ctx.strokeStyle = "rgba(82, 96, 112, 0.28)";
  ctx.lineWidth = 1.3;
  for (const [leftIndex, rightIndex] of backboneEdges()) {
    const left = projected[leftIndex];
    const right = projected[rightIndex];
    ctx.beginPath();
    ctx.moveTo(left.x, left.y);
    ctx.lineTo(right.x, right.y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawWeightedEdges(interval, projected) {
  const maxEdgeWeight = Math.max(...interval.top_edges.map(e => e.weight), 0);
  const edges = interval.top_edges
    .map(edge => ({edge, depth: (projected[edge.vertices[0]]?.depth || 0) + (projected[edge.vertices[1]]?.depth || 0)}))
    .sort((a, b) => a.depth - b.depth);
  ctx.save();
  ctx.lineCap = "round";
  for (const item of edges) {
    const edge = item.edge;
    const left = projected[edge.vertices[0]];
    const right = projected[edge.vertices[1]];
    if (!left || !right) continue;
    ctx.strokeStyle = "rgba(201, 63, 45, 0.74)";
    ctx.lineWidth = 1.4 + 5.5 * edge.weight / Math.max(1e-9, maxEdgeWeight);
    ctx.beginPath();
    ctx.moveTo(left.x, left.y);
    ctx.lineTo(right.x, right.y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPoints(projected, weights, maxWeight) {
  const order = projected.map((p, i) => ({...p, i})).sort((a, b) => a.depth - b.depth);
  for (const p of order) {
    const w = weights[p.i];
    const active = w > 1e-12;
    const radius = (3.0 + 8.0 * Math.sqrt(w / Math.max(1e-9, maxWeight))) * Math.max(0.7, Math.min(1.6, p.perspective));
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = color(w, maxWeight);
    ctx.fill();
    ctx.strokeStyle = active ? "rgba(111, 31, 23, 0.88)" : "rgba(131, 144, 160, 0.58)";
    ctx.lineWidth = active ? 0.9 : 0.45;
    ctx.stroke();
  }
}

function drawViewLabel(width, height) {
  ctx.save();
  ctx.fillStyle = "rgba(255, 255, 255, 0.84)";
  ctx.strokeStyle = "rgba(190, 200, 212, 0.85)";
  ctx.lineWidth = 1;
  roundRect(ctx, width - 144, 14, 122, 30, 7);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#5f6977";
  ctx.font = "13px system-ui, sans-serif";
  ctx.fillText(state.mode === "3d" ? "3D protein view" : "2D PCA view", width - 130, 34);
  ctx.restore();
}

function roundRect(context, x, y, w, h, r) {
  context.beginPath();
  context.moveTo(x + r, y);
  context.arcTo(x + w, y, x + w, y + h, r);
  context.arcTo(x + w, y + h, x, y + h, r);
  context.arcTo(x, y + h, x, y, r);
  context.arcTo(x, y, x + w, y, r);
  context.closePath();
}

function setMode(mode) {
  state.mode = mode;
  state.cameraResetNeeded = true;
  mode3d.classList.toggle("active", mode === "3d");
  mode2d.classList.toggle("active", mode === "2d");
  render(Number(select.value || 0));
}

function resetCamera() {
  state.rotX = -0.35;
  state.rotY = 0.82;
  state.zoom = 1.0;
  state.cameraResetNeeded = true;
  render(Number(select.value || 0));
}

function init() {
  stats.innerHTML = "";
  const statItems = [
    `${DATA.point_count} points`,
    `${DATA.complex.num_edges} edges`,
    `${DATA.complex.num_triangles} triangles`,
    `${DATA.intervals.length} intervals`,
    `${fmt(DATA.timings.total_seconds || 0, 2)}s`
  ];
  for (const item of statItems) {
    const span = document.createElement("span");
    span.className = "pill";
    span.textContent = item;
    stats.append(span);
  }
  DATA.intervals.forEach((interval, index) => {
    const option = document.createElement("option");
    option.value = index;
    option.textContent = `${index}  [${fmt(interval.birth, 3)}, ${fmt(interval.death, 3)})  pers ${fmt(interval.persistence, 3)}`;
    select.append(option);
  });
  select.addEventListener("change", () => render(Number(select.value)));
  mode3d.addEventListener("click", () => setMode("3d"));
  mode2d.addEventListener("click", () => setMode("2d"));
  resetView.addEventListener("click", resetCamera);
  canvas.addEventListener("pointerdown", event => {
    if (useThree) return;
    state.dragging = true;
    state.lastX = event.clientX;
    state.lastY = event.clientY;
    canvas.classList.add("dragging");
    canvas.setPointerCapture(event.pointerId);
  });
  canvas.addEventListener("pointermove", event => {
    if (useThree) return;
    if (!state.dragging) return;
    const dx = event.clientX - state.lastX;
    const dy = event.clientY - state.lastY;
    state.lastX = event.clientX;
    state.lastY = event.clientY;
    if (state.mode === "3d") {
      state.rotY += dx * 0.01;
      state.rotX += dy * 0.01;
      state.rotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, state.rotX));
    } else {
      state.rotY += dx * 0.003;
      state.rotX += dy * 0.003;
    }
    render(Number(select.value || 0));
  });
  canvas.addEventListener("pointerup", event => {
    if (useThree) return;
    state.dragging = false;
    canvas.classList.remove("dragging");
    canvas.releasePointerCapture(event.pointerId);
  });
  canvas.addEventListener("pointercancel", () => {
    if (useThree) return;
    state.dragging = false;
    canvas.classList.remove("dragging");
  });
  canvas.addEventListener("wheel", event => {
    if (useThree) return;
    event.preventDefault();
    const factor = Math.exp(-event.deltaY * 0.001);
    state.zoom = Math.max(0.45, Math.min(4.0, state.zoom * factor));
    render(Number(select.value || 0));
  }, {passive: false});
  window.addEventListener("resize", () => render(Number(select.value)));
  render(0);
}

init();
</script>
</body>
</html>
